<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a10"/>
    </radialGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#c864ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c864ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="8" fill="url(#bg)" stroke="#333" stroke-width="1"/>
  <!-- Elder Sign octagram -->
  <g transform="translate(32,32)" fill="none" stroke="#c864ff" stroke-width="1.2" opacity="0.9">
    <!-- 8-pointed star -->
    <polygon points="0,-22 7,-7 22,0 7,7 0,22 -7,7 -22,0 -7,-7" fill="rgba(200,100,255,0.08)"/>
    <!-- Inner rotated star -->
    <polygon points="0,-14 4.5,-4.5 14,0 4.5,4.5 0,14 -4.5,4.5 -14,0 -4.5,-4.5" fill="rgba(255,215,0,0.1)" stroke="#ffd700" stroke-width="0.8"/>
  </g>
  <!-- Central eye -->
  <g transform="translate(32,31)">
    <!-- Eye white -->
    <ellipse cx="0" cy="0" rx="5.5" ry="4.5" fill="#0a0a10" stroke="#ffd700" stroke-width="0.8"/>
    <!-- Iris -->
    <circle cx="0" cy="0" r="3" fill="#1a1a2e" stroke="#c864ff" stroke-width="0.5"/>
    <!-- Pupil (vertical slit) -->
    <ellipse cx="0" cy="0" rx="1.2" ry="2.5" fill="#ff4444"/>
    <!-- Eye highlight -->
    <circle cx="1.5" cy="-1.5" r="0.8" fill="rgba(255,255,255,0.5)"/>
  </g>
  <!-- Corner sigils -->
  <g stroke="#ffd700" stroke-width="0.6" opacity="0.4" fill="none">
    <circle cx="10" cy="10" r="1.5"/>
    <circle cx="54" cy="10" r="1.5"/>
    <circle cx="10" cy="54" r="1.5"/>
    <circle cx="54" cy="54" r="1.5"/>
  </g>
</svg>
