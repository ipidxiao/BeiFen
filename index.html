    <script>
        function showFatalError(type, msg, file, line, stack) {
            // 如果已经有报错框了，就不重复弹
            if (document.getElementById('fatal-error-screen')) return; 

            // 错误信息可能来自异常 message/stack，必须先转义再进入 innerHTML，避免错误页自身形成 XSS 注入面。
            const escapeHtml = (value) => String(value ?? '').replace(/[&<>"']/g, ch => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[ch]));
            const safeType = escapeHtml(type);
            const safeMsg = escapeHtml(msg);
            const safeFile = escapeHtml(file);
            const safeLine = escapeHtml(line);
            const safeStack = escapeHtml(stack || '无堆栈信息');
            
            const div = document.createElement('div');
            div.id = 'fatal-error-screen';
            div.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(150,0,0,0.95); color:white; z-index:999999; padding:20px; overflow-y:auto; font-family:monospace; box-sizing: border-box;';
            div.innerHTML = `
                <h2 style="color:#ffcc00; border-bottom: 1px solid #ffcc00; padding-bottom: 10px;">🚨 致命崩溃拦截 (${safeType})</h2>
                <p style="font-size: 1.1rem; margin-top: 15px;"><strong>报错信息：</strong><br><span style="color:#ffcccc;">${safeMsg}</span></p>
                ${safeFile ? `<p><strong>文件位置：</strong><br>${safeFile} (第 <strong style="color:#ffcc00;">${safeLine}</strong> 行)</p>` : ''}
                <p><strong>错误堆栈：</strong></p>
                <pre style="background:#000; color:#0f0; padding:10px; border-radius: 4px; white-space:pre-wrap; font-size: 0.8rem; overflow-x: auto;">${safeStack}</pre>
                <button onclick="location.reload()" style="padding:10px 20px; font-size:16px; margin-top:20px; font-weight: bold; background: #ffcc00; border: none; border-radius: 4px; cursor:pointer;">刷新重试</button>
            `;
            // 等待 body 加载完毕后插入
            if (document.body) document.body.appendChild(div);
            else window.addEventListener('DOMContentLoaded', () => document.body.appendChild(div));
        }

        // 1. 捕获常规 JS 语法/运行错误
        window.addEventListener('error', function(e) {
            showFatalError('JavaScript 全局错误', e.message, e.filename, e.lineno, e.error?.stack);
        });

        // 2. 捕获异步 Promise 崩溃
        window.addEventListener('unhandledrejection', function(e) {
            showFatalError('异步调用崩溃', e.reason?.message || e.reason, '', '', e.reason?.stack);
        });

        // 3. 劫持 Vue 的渲染错误 (Vue 错误常常走 console.error)
        const originalError = console.error;
        console.error = function(...args) {
            const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a) : a).join(' ');
            if (msg.includes('Vue')) {
                showFatalError('Vue 渲染/组件错误', msg, '', '', new Error().stack);
            }
            originalError.apply(console, args);
        };

        // 4. 劫持 Vue 找不到组件的警告 (非常容易导致黑屏)
        const originalWarn = console.warn;
        console.warn = function(...args) {
            const msg = args.join(' ');
            if (msg.includes('Failed to resolve component')) {
                showFatalError('组件挂载失败', msg, '通常是 index.html 里忘记引入 script 标签，或者文件名拼写错误。', '', '');
            }
            originalWarn.apply(console, args);
        };
    </script>
