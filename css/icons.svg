<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <defs>
    <!-- 通用样式 -->
    <style>
      .ic{fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>
  
  <!-- dice: 二十面骰剪影 -->
  <symbol id="icon-dice" viewBox="0 0 24 24">
    <polygon points="12,2 3,9 12,16 21,9" class="ic"/>
    <polygon points="12,16 3,9 8,18 12,22" class="ic"/>
    <polygon points="12,16 21,9 16,18 12,22" class="ic"/>
    <circle cx="12" cy="12" r="1.5" fill="currentColor" opacity="0.5"/>
  </symbol>
  
  <!-- character: 人物剪影 -->
  <symbol id="icon-character" viewBox="0 0 24 24">
    <circle cx="12" cy="7" r="3.5" class="ic"/>
    <path d="M5,21c0-4 3-7 7-7s7,3 7,7" class="ic"/>
  </symbol>
  
  <!-- inventory: 背包 -->
  <symbol id="icon-inventory" viewBox="0 0 24 24">
    <rect x="4" y="8" width="16" height="13" rx="2" class="ic"/>
    <path d="M8,8V6a4,4 0 0 1 8,0v2" class="ic"/>
    <line x1="10" y1="13" x2="14" y2="13" class="ic"/>
  </symbol>
  
  <!-- storage: 箱子 -->
  <symbol id="icon-storage" viewBox="0 0 24 24">
    <rect x="3" y="9" width="18" height="12" rx="1.5" class="ic"/>
    <path d="M3,9l2-4h14l2,4" class="ic"/>
    <line x1="12" y1="9" x2="12" y2="21" class="ic"/>
    <circle cx="12" cy="15" r="1" fill="currentColor"/>
  </symbol>
  
  <!-- journal: 古籍书卷 -->
  <symbol id="icon-journal" viewBox="0 0 24 24">
    <path d="M4,4h7l2,2l2-2h5v16H4Z" class="ic"/>
    <line x1="8" y1="8" x2="16" y2="8" class="ic"/>
    <line x1="8" y1="11" x2="16" y2="11" class="ic"/>
    <line x1="8" y1="14" x2="14" y2="14" class="ic"/>
  </symbol>
  
  <!-- npc: 面具 (调查对象) -->
  <symbol id="icon-npc" viewBox="0 0 24 24">
    <path d="M4,12c0-5 4-8 8-8s8,3 8,8v3H4Z" class="ic"/>
    <circle cx="10" cy="11" r="1" fill="currentColor"/>
    <circle cx="14" cy="11" r="1" fill="currentColor"/>
    <line x1="8" y1="16" x2="16" y2="16" class="ic"/>
  </symbol>
  
  <!-- growth: 上升箭头+星 -->
  <symbol id="icon-growth" viewBox="0 0 24 24">
    <polyline points="6,15 10,9 14,12 18,5" class="ic"/>
    <polyline points="14,5 18,5 18,9" class="ic"/>
    <circle cx="9" cy="9" r="1.5" fill="currentColor" opacity="0.4"/>
    <circle cx="16" cy="16" r="1" fill="currentColor" opacity="0.3"/>
  </symbol>
  
  <!-- clues: 放大镜 -->
  <symbol id="icon-clues" viewBox="0 0 24 24">
    <circle cx="10" cy="10" r="6" class="ic"/>
    <line x1="15" y1="15" x2="21" y2="21" class="ic"/>
    <circle cx="10" cy="10" r="1.5" fill="currentColor" opacity="0.4"/>
  </symbol>
  
  <!-- equip: 剑盾十字 -->
  <symbol id="icon-equip" viewBox="0 0 24 24">
    <line x1="12" y1="2" x2="12" y2="14" class="ic"/>
    <line x1="12" y1="14" x2="5" y2="21" class="ic"/>
    <path d="M12,14l2,2l5,5" class="ic"/>
    <rect x="5" y="18" width="4" height="6" rx="1" class="ic" transform="rotate(-45 7 21)"/>
  </symbol>
  
  <!-- combat: 交叉剑 -->
  <symbol id="icon-combat" viewBox="0 0 24 24">
    <line x1="2" y1="2" x2="16" y2="16" class="ic"/>
    <line x1="22" y1="2" x2="8" y2="16" class="ic"/>
    <circle cx="12" cy="9" r="1.5" fill="currentColor" opacity="0.5"/>
  </symbol>
  
  <!-- tentacle: 触手 -->
  <symbol id="icon-tentacle" viewBox="0 0 24 24">
    <path d="M12,21c0-3-1-5-3-8-2-3-1-6 1-7s4,1 4,4c0,2-1,4-3,5" class="ic"/>
    <path d="M12,21c0-3 1-5 3-8 2-3 1-6-1-7s-4,1-4,4" class="ic"/>
    <circle cx="12" cy="21" r="1" fill="currentColor"/>
  </symbol>
  
  <!-- eye: 竖瞳眼球 -->
  <symbol id="icon-eye" viewBox="0 0 24 24">
    <ellipse cx="12" cy="12" rx="7" ry="5" class="ic"/>
    <ellipse cx="12" cy="12" rx="2.5" ry="4.5" fill="currentColor" opacity="0.6"/>
    <circle cx="12" cy="12" r="1" fill="#0a0a10"/>
    <path d="M4,12c2-4 4-5 8-5s6,1 8,5" class="ic" opacity="0.3"/>
  </symbol>

  <!-- scroll: 剧情卷轴 -->
  <symbol id="icon-scroll" viewBox="0 0 24 24">
    <path d="M6,4h10a2,2 0 0 1 2,2v12a2,2 0 0 1-2,2H6" class="ic"/>
    <path d="M6,4v16" class="ic"/>
    <line x1="9" y1="8" x2="15" y2="8" class="ic"/>
    <line x1="9" y1="12" x2="15" y2="12" class="ic"/>
    <line x1="9" y1="16" x2="13" y2="16" class="ic"/>
  </symbol>

  <!-- helmet: 头盔 -->
  <symbol id="icon-helmet" viewBox="0 0 24 24">
    <path d="M4,14c0-5 4-8 8-8s8,3 8,8v4H4Z" class="ic"/>
    <line x1="4" y1="18" x2="20" y2="18" class="ic"/>
    <path d="M8,18v2a4,4 0 0 0 8,0v-2" class="ic"/>
  </symbol>

  <!-- shield: 盾牌 -->
  <symbol id="icon-shield" viewBox="0 0 24 24">
    <path d="M12,2l8,3v7c0,5-3.5,8.5-8,10-4.5-1.5-8-5-8-10V5Z" class="ic"/>
    <line x1="12" y1="7" x2="12" y2="14" class="ic"/>
    <line x1="9" y1="10.5" x2="15" y2="10.5" class="ic"/>
  </symbol>

  <!-- rifle: 步枪 -->
  <symbol id="icon-rifle" viewBox="0 0 24 24">
    <line x1="2" y1="14" x2="20" y2="14" class="ic"/>
    <line x1="6" y1="14" x2="6" y2="18" class="ic"/>
    <line x1="14" y1="14" x2="14" y2="17" class="ic"/>
    <rect x="16" y="12" width="5" height="4" rx="1" class="ic"/>
    <line x1="4" y1="12" x2="8" y2="12" class="ic"/>
  </symbol>

  <!-- pistol: 手枪 -->
  <symbol id="icon-pistol" viewBox="0 0 24 24">
    <path d="M4,10h10l2,2h4v4H14l-2,2H6a2,2 0 0 1-2-2Z" class="ic"/>
    <line x1="8" y1="14" x2="8" y2="18" class="ic"/>
    <line x1="12" y1="10" x2="12" y2="8" class="ic"/>
  </symbol>

  <!-- settings: 齿轮 -->
  <symbol id="icon-settings" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="3" class="ic"/>
    <path d="M12,2v2M12,20v2M4.2,4.2l1.4,1.4M18.4,18.4l1.4,1.4M2,12h2M20,12h2M4.2,19.8l1.4-1.4M18.4,5.6l1.4-1.4" class="ic"/>
  </symbol>

  <!-- elder: Elder Sign octagram (lobby hero) -->
  <symbol id="icon-elder" viewBox="0 0 64 64">
    <g transform="translate(32,32)" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round">
      <polygon points="0,-22 7,-7 22,0 7,7 0,22 -7,7 -22,0 -7,-7"/>
      <polygon points="0,-14 4.5,-4.5 14,0 4.5,4.5 0,14 -4.5,4.5 -14,0 -4.5,-4.5" opacity="0.65"/>
    </g>
    <ellipse cx="32" cy="31" rx="4" ry="3.2" class="ic"/>
    <ellipse cx="32" cy="31" rx="1.2" ry="2.2" fill="currentColor" opacity="0.7"/>
  </symbol>

  <!-- d6: cube face silhouette -->
  <symbol id="icon-d6" viewBox="0 0 24 24">
    <rect x="5" y="5" width="14" height="14" rx="2.5" class="ic"/>
    <circle cx="9" cy="9" r="1" fill="currentColor" opacity="0.45"/>
    <circle cx="15" cy="15" r="1" fill="currentColor" opacity="0.45"/>
  </symbol>

  <!-- d20: icosahedron silhouette -->
  <symbol id="icon-d20" viewBox="0 0 24 24">
    <polygon points="12,2 3,9 12,16 21,9" class="ic"/>
    <polygon points="12,16 3,9 8,18 12,22" class="ic"/>
    <polygon points="12,16 21,9 16,18 12,22" class="ic"/>
  </symbol>

  <!-- tier badges — S/A/B/C/MYTHIC rarity rings -->
  <symbol id="icon-tier-s" viewBox="0 0 24 24">
    <polygon points="12,2 15,9 22,9 16,14 18,22 12,18 6,22 8,14 2,9 9,9" class="ic"/>
  </symbol>
  <symbol id="icon-tier-a" viewBox="0 0 24 24">
    <polygon points="12,3 20,12 12,21 4,12" class="ic"/>
  </symbol>
  <symbol id="icon-tier-b" viewBox="0 0 24 24">
    <polygon points="12,2 21,7 21,17 12,22 3,17 3,7" class="ic"/>
  </symbol>
  <symbol id="icon-tier-c" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="9" class="ic"/>
  </symbol>
  <symbol id="icon-tier-mythic" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="9" class="ic"/>
    <ellipse cx="12" cy="12" rx="2.5" ry="4.5" fill="currentColor" opacity="0.55"/>
    <circle cx="12" cy="12" r="1" fill="currentColor"/>
  </symbol>
</svg>
